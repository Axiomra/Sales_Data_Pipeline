name: Deploy dbt Project to Airflow Bucket

on:
  push:
    branches:
      - main  # Jab aap main branch par push karenge tab ye chalega

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Auth to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Upload Folder to GCS
        uses: google-github-actions/upload-cloud-storage@v1
        with:
          path: ./  # Pura dbt project folder
          destination: us-central1-retails-data-pi-245c6429-bucket/dags/Sales_Data_Pipeline
          parent: false